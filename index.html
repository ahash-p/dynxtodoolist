<html>
<head>
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>To Do List of tasks</h1>

    <input type="text" id="taskInput" placeholder="Enter the to do task">
    <button onclick="addTask()">Add task</button>

    <br><br>

    <button onclick="displayTasks()">All</button>
    <button onclick="showCompleted()">done</button>
    <button onclick="showPending()">Not completed</button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>

</body>
</html>
